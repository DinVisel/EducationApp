name: Deploy Backend

# Builds the API container and pushes it to GitHub Container Registry (GHCR).
# Fires on pushes to main and on version tags (v1.2.3). Your host (Fly.io,
# Render, a VM, etc.) then pulls `ghcr.io/<owner>/<repo>-api:<tag>`.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./TeacherTracker.Api
          file: ./TeacherTracker.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Optional: trigger a redeploy on your host after the image is pushed. ──
