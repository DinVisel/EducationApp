name: Deploy Backend

# Builds the API container and pushes it to Docker Hub.
# Fires on pushes to main and on version tags (v1.2.3). Your server then pulls
# `docker.io/<DOCKERHUB_USERNAME>/teacher-tracker-api:<tag>` and runs it.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token (Account -> Security -> New Access Token)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: teacher-tracker-api

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./TeacherTracker.Api
          file: ./TeacherTracker.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # SSH into the VPS and roll the new image. Only runs on main/tags (not on the
  # manual-branch case) after the image is pushed. Requires the SERVER_* secrets.
  deploy:
    name: Redeploy on server
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Pull & restart on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/eduapp
            docker compose pull api
            docker compose up -d api
            docker image prune -f
